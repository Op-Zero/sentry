{{- if and (not .Values.kafka.enabled) .Values.externalKafka.provisioning.enabled }}
{{- $provisioning := .Values.externalKafka.provisioning }}
{{- $topicctl := $provisioning.topicctl | default dict }}
{{- $sasl := .Values.externalKafka.sasl | default dict }}
{{- $saslEnabled := and $sasl.mechanism (ne $sasl.mechanism "None") }}
{{- $saslFromSecret := $sasl.existingSecret }}
{{- $securityProtocol := .Values.externalKafka.security.protocol | default "PLAINTEXT" | upper }}

{{/* Build bootstrap servers from cluster or host/port */}}
{{- $brokers := list }}
{{- if .Values.externalKafka.cluster }}
{{- range .Values.externalKafka.cluster }}
{{- $brokers = append $brokers (dict "host" .host "port" (int .port)) }}
{{- end }}
{{- else }}
{{- $brokers = append $brokers (dict "host" .Values.externalKafka.host "port" (int .Values.externalKafka.port)) }}
{{- end }}

{{- $bootstrapServers := list }}
{{- range $brokers }}
{{- $bootstrapServers = append $bootstrapServers (printf "%s:%d" .host .port) }}
{{- end }}

{{/* Get topic list from externalKafka.provisioning.topics or fall back to kafka.provisioning.topics */}}
{{- $topics := $provisioning.topics | default .Values.kafka.provisioning.topics }}
{{- $topicOverrides := $provisioning.topicOverrides | default dict }}
{{- $replicationFactor := int ($provisioning.replicationFactor | default 1) }}
{{- $defaultPartitions := int ($provisioning.numPartitions | default 1) }}
{{- $minInsyncReplicas := $provisioning.minInsyncReplicas | default "" }}

{{- $clusterName := $topicctl.clusterName | default "sentry-kafka" }}
{{- $environment := $topicctl.environment | default "default" }}
{{- $region := $topicctl.region | default "default" }}
{{- $placementStrategy := $topicctl.placementStrategy | default "balanced-leaders" }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-topicctl-provisioning
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: kafka-provisioning
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/hook-weight": "-5"
data:
  wait-for-kafka.sh: |
    #!/bin/sh
    set -eu
    {{- range $brokers }}
    timeout=120; until nc -z {{ .host }} {{ .port }} 2>/dev/null; do
      timeout=$((timeout - 2)); [ $timeout -le 0 ] && echo "Timed out waiting for {{ .host }}:{{ .port }}" && exit 1;
      sleep 2;
    done;
    {{- end }}
    echo "Kafka is available";

  cluster.yaml: |
    meta:
      name: {{ $clusterName }}
      environment: {{ $environment }}
      region: {{ $region }}
    spec:
      bootstrapAddrs:
      {{- range $bootstrapServers }}
        - {{ . | quote }}
      {{- end }}
      {{- if or (eq $securityProtocol "SSL") (eq $securityProtocol "SASL_SSL") }}
      tls:
        enabled: true
        {{- with $topicctl.tls }}
        {{- if .caCertPath }}
        caCertPath: {{ .caCertPath | quote }}
        {{- end }}
        {{- if .certPath }}
        certPath: {{ .certPath | quote }}
        {{- end }}
        {{- if .keyPath }}
        keyPath: {{ .keyPath | quote }}
        {{- end }}
        {{- if .skipVerify }}
        skipVerify: true
        {{- end }}
        {{- end }}
      {{- end }}
      {{- if $saslEnabled }}
      sasl:
        enabled: true
        mechanism: {{ $sasl.mechanism }}
        {{- if $saslFromSecret }}
        username: ${TOPICCTL_SASL_USERNAME}
        password: ${TOPICCTL_SASL_PASSWORD}
        {{- else if and $sasl.username $sasl.password }}
        username: {{ $sasl.username | quote }}
        password: {{ $sasl.password | quote }}
        {{- end }}
      {{- end }}

  topics.yaml: |
    {{- range $topics }}
    {{- $topicName := .name }}
    {{- $override := index $topicOverrides $topicName | default dict }}
    {{- $partitions := $override.partitions | default .partitions | default $defaultPartitions }}
    {{- $topicPlacementStrategy := $override.placementStrategy | default .placementStrategy | default $placementStrategy }}
    {{- $config := .config | default dict }}
    {{- if $override.config }}
    {{-   $config = mustMergeOverwrite (dict) $config $override.config }}
    {{- end }}
    {{- if and $minInsyncReplicas (not (hasKey $config "min.insync.replicas")) }}
    {{-   $config = merge $config (dict "min.insync.replicas" ($minInsyncReplicas | toString)) }}
    {{- end }}
    ---
    meta:
      name: {{ $topicName }}
      cluster: {{ $clusterName }}
      environment: {{ $environment }}
      region: {{ $region }}
    spec:
      partitions: {{ $partitions }}
      replicationFactor: {{ $replicationFactor }}
      placement:
        strategy: {{ $topicPlacementStrategy }}
      {{- if $config }}
      settings:
        {{- range $key, $value := $config }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
