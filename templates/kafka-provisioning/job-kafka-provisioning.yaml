{{- if and (not .Values.kafka.enabled) .Values.externalKafka.provisioning.enabled }}
{{- $provisioning := .Values.externalKafka.provisioning }}
{{- $topicctl := $provisioning.topicctl | default dict }}
{{- $saslFromSecret := .Values.externalKafka.sasl.existingSecret }}

{{- $topicctlImage := printf "%s:%s" ($topicctl.image.repository | default "segment/topicctl") ($topicctl.image.tag | default "v2.0.2") }}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-kafka-provisioning
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: kafka-provisioning
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/hook-weight": "0"
spec:
  {{- if .Values.hooks.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.hooks.activeDeadlineSeconds }}
  {{- end}}
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: kafka-provisioning
    spec:
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 0
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- if $provisioning.nodeSelector }}
      nodeSelector:
{{ toYaml $provisioning.nodeSelector | indent 8 }}
      {{- else if .Values.global.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.global.nodeSelector | indent 8 }}
      {{- end }}
      {{- if $provisioning.tolerations }}
      tolerations:
{{ toYaml $provisioning.tolerations | indent 8 }}
      {{- else if .Values.global.tolerations }}
      tolerations:
{{ toYaml .Values.global.tolerations | indent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          command:
            - /bin/sh
            - /scripts/wait-for-kafka.sh
          {{- if $provisioning.resources }}
          resources:
{{ toYaml $provisioning.resources | indent 12 }}
          {{- end }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      containers:
        - name: topicctl-provisioning
          image: {{ $topicctlImage }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          {{- if $saslFromSecret }}
          env:
            - name: TOPICCTL_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $saslFromSecret }}
                  key: {{ (.Values.externalKafka.sasl.existingSecretKeys).username | default "username" }}
            - name: TOPICCTL_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $saslFromSecret }}
                  key: {{ (.Values.externalKafka.sasl.existingSecretKeys).password | default "password" }}
          {{- end }}
          command:
            - /bin/topicctl
            - apply
            - --skip-confirm
            - --expand-env
            - --cluster-config=/configs/cluster.yaml
            - /configs/topics.yaml
          {{- if $provisioning.resources }}
          resources:
{{ toYaml $provisioning.resources | indent 12 }}
          {{- end }}
          volumeMounts:
            - name: configs
              mountPath: /configs
            - name: tmp
              mountPath: /tmp
{{- if $provisioning.volumeMounts }}
{{ toYaml $provisioning.volumeMounts | indent 12 }}
{{- end }}
{{- if .Values.global.volumeMounts }}
{{ toYaml .Values.global.volumeMounts | indent 12 }}
{{- end }}
{{- if $provisioning.sidecars }}
{{ toYaml $provisioning.sidecars | indent 8 }}
{{- end }}
{{- if .Values.global.sidecars }}
{{ toYaml .Values.global.sidecars | indent 8 }}
{{- end }}
      volumes:
        - name: configs
          configMap:
            name: {{ .Release.Name }}-topicctl-provisioning
        - name: scripts
          configMap:
            name: {{ .Release.Name }}-topicctl-provisioning
            defaultMode: 0755
        - name: tmp
          emptyDir: {}
{{- if $provisioning.volumes }}
{{ toYaml $provisioning.volumes | indent 8 }}
{{- end }}
{{- if .Values.global.volumes }}
{{ toYaml .Values.global.volumes | indent 8 }}
{{- end }}
{{- end }}
