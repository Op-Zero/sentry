{{- if .Values.sentry.taskScheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "sentry.fullname" . }}-taskscheduler
  labels:
    app: {{ template "sentry.fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    role: taskscheduler
    {{- include "sentry.component.labels" (dict "component" "taskscheduler" "ctx" .) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ default 1 .Values.sentry.taskScheduler.replicas }}
  selector:
    matchLabels:
        app: {{ template "sentry.fullname" . }}
        release: "{{ .Release.Name }}"
        role: taskscheduler
  template:
    metadata:
      annotations:
        checksum/configYml: {{ .Values.config.configYml | toYaml | toString | sha256sum }}
        checksum/sentryConfPy: {{ .Values.config.sentryConfPy | sha256sum }}
        checksum/config.yaml: {{ include "sentry.config" . | sha256sum }}
      {{- if .Values.sentry.taskScheduler.annotations }}
{{ toYaml .Values.sentry.taskScheduler.annotations | indent 8 }}
      {{- end }}          
      labels:
        app: {{ template "sentry.fullname" . }}
        release: "{{ .Release.Name }}"
        role: taskscheduler
        {{- include "sentry.component.labels" (dict "component" "taskscheduler" "ctx" .) | nindent 8 }}
    spec:
      {{- if .Values.images.sentry.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.images.sentry.imagePullSecrets | indent 8 }}
      {{- end }}
      affinity:
      {{- if .Values.sentry.taskScheduler.affinity }}
{{ toYaml .Values.sentry.taskScheduler.affinity | indent 8 }}
      {{- end }}
      {{- if .Values.sentry.taskScheduler.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.sentry.taskScheduler.nodeSelector | indent 8 }}
      {{- else if .Values.global.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.global.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsPolicy | quote }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig:
{{ toYaml .Values.dnsConfig | indent 8 }}
      {{- end }}
      {{- if .Values.sentry.taskScheduler.tolerations }}
      tolerations:
{{ toYaml .Values.sentry.taskScheduler.tolerations | indent 8 }}
      {{- else if .Values.global.tolerations }}
      tolerations:
{{ toYaml .Values.global.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.sentry.taskScheduler.topologySpreadConstraints }}
      topologySpreadConstraints:
{{ toYaml .Values.sentry.taskScheduler.topologySpreadConstraints | indent 8 }}
      {{- end }}
      {{- if .Values.sentry.taskScheduler.securityContext }}
      securityContext:
{{ toYaml .Values.sentry.taskScheduler.securityContext | indent 8 }}
      {{- end }}
      {{- if .Values.sentry.taskScheduler.priorityClassName }}
      priorityClassName: "{{ .Values.sentry.taskScheduler.priorityClassName }}"
      {{- end }}
      {{- if .Values.serviceAccount.enabled }}
      serviceAccountName: {{ .Values.serviceAccount.name }}-taskscheduler
      {{- end }}
      initContainers:
{{ include "sentry.initContainer.nodestore-s3" . | indent 6 }}
      containers:
      - name: taskscheduler
        image: "{{ template "sentry.image" . }}"
        imagePullPolicy: {{ default "IfNotPresent" .Values.images.sentry.pullPolicy }}
        command: ["sentry"]
        args:
          - "run"
          - "taskworker-scheduler"
        env:
        - name: C_FORCE_ROOT
          value: "true"
{{ include "sentry.env" . | indent 8 }}
{{ include "sentry.env.nodestore-s3" . | indent 8 }}
{{- if .Values.sentry.taskScheduler.env }}
{{ toYaml .Values.sentry.taskScheduler.env | indent 8 }}
{{- end }}
        resources:
{{ toYaml .Values.sentry.taskScheduler.resources | indent 10 }}
{{- if .Values.sentry.taskScheduler.containerSecurityContext }}
        securityContext:
{{ toYaml .Values.sentry.taskScheduler.containerSecurityContext | indent 10 }}
{{- end }}
        volumeMounts:
        - mountPath: /etc/sentry
          name: config
          readOnly: true
        - mountPath: {{ .Values.filestore.filesystem.path }}
          name: sentry-data
{{ include "sentry.volumeMount.replay-filesystem" . | indent 8 }}
{{ include "sentry.volumeMount.nodestore-s3" . | indent 8 }}
        {{- if and .Values.geodata.volumeName .Values.geodata.accountID }}
        - name: {{ .Values.geodata.volumeName }}
          mountPath: {{ .Values.geodata.mountPath }}
          readOnly: true
        {{- end }}
        {{- if include "sentry.gcs.secretName" . }}
        - name: sentry-google-cloud-key
          mountPath: /var/run/secrets/google
        {{ end }}
{{- if .Values.sentry.taskScheduler.volumeMounts }}
{{ toYaml .Values.sentry.taskScheduler.volumeMounts | indent 8 }}
{{- end }}
{{- if .Values.global.volumeMounts }}
{{ toYaml .Values.global.volumeMounts | indent 8 }}
{{- end }}
{{- if .Values.sentry.taskScheduler.sidecars }}
{{ toYaml .Values.sentry.taskScheduler.sidecars | indent 6 }}
{{- end }}
{{- if .Values.global.sidecars }}
{{ toYaml .Values.global.sidecars | indent 6 }}
{{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ template "sentry.fullname" . }}-sentry
{{ include "sentry.volume.nodestore-s3" . | indent 6 }}
      - name: sentry-data
      {{- if and (eq .Values.filestore.backend "filesystem") .Values.filestore.filesystem.persistence.enabled (.Values.filestore.filesystem.persistence.persistentWorkers) }}
      {{- if .Values.filestore.filesystem.persistence.existingClaim }}
        persistentVolumeClaim:
          claimName: {{ .Values.filestore.filesystem.persistence.existingClaim }}
      {{- else }}
        persistentVolumeClaim:
          claimName: {{ template "sentry.fullname" . }}-data
      {{- end }}
      {{- else }}
        emptyDir: {}
      {{ end }}
{{ include "sentry.volume.replay-filesystem" . | indent 6 }}
      {{- if include "sentry.gcs.secretName" . }}
      - name: sentry-google-cloud-key
        secret:
          secretName: {{ include "sentry.gcs.secretName" . }}
      {{ end }}
      {{- if and .Values.geodata.volumeName .Values.geodata.accountID }}
      - name: {{ .Values.geodata.volumeName }}
        persistentVolumeClaim:
          claimName: data-sentry-geoip
      {{- end }}
{{- if .Values.sentry.taskScheduler.volumes }}
{{ toYaml .Values.sentry.taskScheduler.volumes | indent 6 }}
{{- end }}
{{- if .Values.global.volumes }}
{{ toYaml .Values.global.volumes | indent 6 }}
{{- end }}
{{- end }}
