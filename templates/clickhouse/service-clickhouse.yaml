{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "sentry.clickhouse.host" . }}
  labels:
    app: {{ template "sentry.fullname" . }}-clickhouse
    chart: "{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
spec:
  ports:
  - port: {{ .Values.externalClickhouse.httpPort }}
    name: http
    targetPort: http
  - port: {{ .Values.externalClickhouse.tcpPort }}
    name: native
    targetPort: native
  selector:
    app: {{ template "sentry.fullname" . }}-clickhouse
{{- end }}
