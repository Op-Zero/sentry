symbolicator:
  enabled: false
  api:
    annotations: {}
    cleaner:
      enabled: true
      repeat: "1h"
      resources: {}
    usedeployment: true  # Set true to use Deployment, false for StatefulSet
    persistence:
      enabled: true  # Set true for using PersistentVolumeClaim, false for emptyDir
      accessModes: ["ReadWriteOnce"]
      # storageClassName: standard
      size: "10Gi"
      ## If 'lookupVolumeName' is set to true, Helm will attempt to retrieve
      ## the current value of 'spec.volumeName' and incorporate it into the template.
      lookupVolumeName: true
      # persistentVolumeClaimRetentionPolicy controls PVC lifecycle on StatefulSet deletion/scale-down.
      # Requires Kubernetes 1.27+ with StatefulSetAutoDeletePVC feature gate enabled.
      # persistentVolumeClaimRetentionPolicy:
      #   whenDeleted: Retain  # or Delete
      #   whenScaled: Retain   # or Delete

      ## If existingClaim is specified, no PVC will be created and this claim will
      ## be used
      existingClaim: ""
    replicas: 1
    env: []
    # HTTP probes: liveness tolerates brief blips; readiness is stricter so Service endpoints drop faster.
    livenessProbe:
      failureThreshold: 5
      initialDelaySeconds: 10
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 2
    readinessProbe:
      failureThreshold: 2
      initialDelaySeconds: 10
      periodSeconds: 3
      successThreshold: 1
      timeoutSeconds: 2
    resources: {}
    affinity: {}
    nodeSelector: {}
    securityContext:
      fsGroup: 65532
      runAsGroup: 65532
      runAsUser: 65532
    topologySpreadConstraints: []
    containerSecurityContext: {}
    tolerations: []
    podLabels: {}
    # priorityClassName: "xxx"
    config: |-
      # See: https://getsentry.github.io/symbolicator/#configuration
      cache_dir: "/data"
      bind: "0.0.0.0:3021"
      logging:
        level: "warn"
      metrics:
        statsd: null
        prefix: "symbolicator"
      sentry_dsn: null
      connect_to_reserved_ips: true
      # caches:
      #   downloaded:
