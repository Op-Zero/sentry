ingress:
  enabled: false
  ingressClassName: nginx
  # Select the ingress controller path style (nginx, traefik, alb, gce).
  # If empty, it is inferred from ingressClassName (defaults to nginx).
  # For custom ingressClassName values, set regexPathStyle explicitly.
  # Aliases: aws-alb -> alb, gke/gce-internal -> gce.
  regexPathStyle: ""
  pathType: ImplementationSpecific
  # Add custom labels for ingress resource
  # labels:
  # Default annotations are tuned for nginx ingress; override for other controllers.
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
    # Use below annotations to enable HTTP to HTTPS redirects on AWS ALB
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
  # Default ingress path rules keyed by controller style.
  # Override this when using a different controller or custom class name.
  # Each rule supports: path, service (web|relay) and optional pathType.
  pathRules:
    nginx:
      - path: /api/store
        service: relay
      - path: /api/[1-9][0-9]*/(.*)
        service: relay
      - path: /api/0/relays/(.*)
        service: relay
      - path: /
        service: web
    traefik:
      - path: /api/store
        service: relay
      - path: /api/{[1-9][0-9]*}/{(.*)}
        service: relay
      - path: /api/0/relays/{(.*)}
        service: relay
      - path: /
        service: web
    alb:
      - path: /api/0/relays/*
        service: relay
      - path: /api/0/*
        service: web
      - path: /api/*
        service: relay
      - path: /*
        service: web
    gce:
      - path: /api/0/relays/*
        service: relay
      - path: /api/0/*
        service: web
      - path: /api/*
        service: relay
      - path: /*
        service: web
  # hostname:
  # additionalHostNames: []
  #
  # tls:
  # - secretName:
  #   hosts:

traefikIngressRoute:
  # -- Enable Traefik IngressRoute instead of standard Ingress
  # Use this when running Traefik as your ingress controller for proper regex path matching
  enabled: false

  # -- Traefik entrypoints to use
  entryPoints:
    - web
    - websecure

  # -- Hostname for the IngressRoute
  # hostname: sentry.example.com

  # -- TLS configuration (optional, omit if TLS is terminated upstream)
  tls: {}
    # secretName: sentry-tls
    # options:
    #   name: default
    #   namespace: default

  # -- Additional route annotations
  annotations: {}

  # -- Additional route labels
  labels: {}

  # -- Route priority (higher = matched first)
  priority: 100

# Kubernetes Gateway API HTTPRoute configuration
# Configure gateway routes for the chart here. More routes can be added by adding
# a dictionary key like the 'main' route.
# Reference: https://gateway-api.sigs.k8s.io/
route:
  main:
    # -- Enables or disables the route
    enabled: false

    # -- Set the route apiVersion
    apiVersion: gateway.networking.k8s.io/v1

    # -- Set the route kind
    # Valid options are GRPCRoute, HTTPRoute, TCPRoute, TLSRoute, UDPRoute
    kind: HTTPRoute

    # -- Route annotations
    annotations: {}

    # -- Route labels
    labels: {}

    # -- Hostnames for the HTTPRoute
    # Example: ["sentry.example.com", "sentry.internal.example.com"]
    hostnames: []

    # -- Parent Gateway references
    # At least one parentRef is required when enabled
    parentRefs: []
      # - name: my-gateway
      #   namespace: default
      #   sectionName: https


    # -- Additional custom rules to prepend
    additionalRules: []

    # -- Filters applied to requests
    filters: []

    # -- Timeouts applied to requests
    timeouts: {}

  # -- HTTP to HTTPS redirect route
  # Creates a separate HTTPRoute that redirects HTTP traffic to HTTPS
  httpRedirect:
    # -- Enables or disables the redirect route
    enabled: false

    # -- Set the route apiVersion
    apiVersion: gateway.networking.k8s.io/v1

    # -- Set the route kind
    kind: HTTPRoute

    # -- Route annotations
    annotations: {}

    # -- Route labels
    labels: {}

    # -- Hostnames (if empty, inherits from main route)
    hostnames: []

    # -- Parent reference for the HTTP listener
    parentRefs: []
      # - name: my-gateway
      #   namespace: default
      #   sectionName: http

    # -- HTTP status code for redirect (301 = permanent, 302 = temporary)
    statusCode: 301

# For other configuration options see: https://github.com/CloudPirates-io/helm-charts/tree/main/charts/nginx
nginx:
  enabled: false
  existingServerConfigConfigmap: '{{ template "sentry.fullname" . }}'
  extraLocationSnippet: false
  # extraLocationSnippet: |
  #  location /admin {
  #    allow 1.2.3.4; # VPN network
  #    deny all;
  #    proxy_pass http://sentry;
  #  }

filestore:
  # Set to one of filesystem, gcs or s3 as supported by Sentry.
  backend: filesystem

  filesystem:
    path: /var/lib/sentry/files

    ## Enable persistence using Persistent Volume Claims
    ## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
    ##
    persistence:
      enabled: true
      ## database data Persistent Volume Storage Class
      ## If defined, storageClassName: <storageClass>
      ## If set to "-", storageClassName: "", which disables dynamic provisioning
      ## If undefined (the default) or set to null, no storageClassName spec is
      ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
      ##   GKE, AWS & OpenStack)
      ##
      # storageClass: "-"
      accessMode: ReadWriteOnce  # Set ReadWriteMany for work Replays
      size: 10Gi

      ## Whether to mount the persistent volume to the Sentry worker and
      ## cron deployments. This setting needs to be enabled for some advanced
      ## Sentry features, such as private source maps. If you disable this
      ## setting, the Sentry workers will not have access to artifacts you upload
      ## through the web deployment.
      ## Please note that you may need to change your accessMode to ReadWriteMany
      ## if you plan on having the web, worker and cron deployments run on
      ## different nodes.
      persistentWorkers: false

      ## If existingClaim is specified, no PVC will be created and this claim will
      ## be used
      existingClaim: ""

      ## If 'lookupVolumeName' is set to true, Helm will attempt to retrieve
      ## the current value of 'spec.volumeName' and incorporate it into the template.
      lookupVolumeName: true

  gcs: {}
    ## Point this at a pre-configured secret containing a service account. The resulting
    ## secret will be mounted at /var/run/secrets/google
    ## If replay.storage.backend or filestore.profiles.backend is also "gcs",
    ## secretName and credentialsFile must match.
    # secretName:
    # credentialsFile: credentials.json
  # bucketName:

  s3: {}
  #  existingSecret:
  #  accessKeyIdRef:
  #  secretAccessKeyRef:
  #  accessKey:
  #  secretKey:
  #  bucketName:
  #  endpointUrl:
  #  signature_version:
  #  region_name:
  #  default_acl:

  ## Profiles storage configuration
  ## The profiling team has been working on vroomrs, and it's now doing the heavy lifting.
  ## The ingest-profiles container now processes profiles immediately via vroomrs and writes
  ## them directly to your bucket. This streamlines the pipeline.
  ##
  ## RECOMMENDATION: Use object storage for profiles (for example S3-compatible storage or GCS).
  ## While filesystem backend is supported (for sharing PVC between vroom and ingest-profiles pods),
  ## it's not recommended for production use due to performance and scalability concerns.
  profiles:
    # Set to one of filesystem, gcs or s3 as supported by Sentry profiling.
    backend: filesystem
    gcs: {}
    ## Point this at a pre-configured secret containing a service account. The resulting
    ## secret will be mounted at /var/run/secrets/google
    ## IMPORTANT: This secret/credentialsFile pair is mounted into all Sentry pods.
    ## If filestore.backend or replay.storage.backend is also "gcs", these values must match.
    #  secretName:
    #  credentialsFile: credentials.json
    #  bucketName:
    s3:
    #  existingSecret:
    #  accessKeyIdRef:
    #  secretAccessKeyRef:
    #  accessKey:
    #  secretKey:
    #  bucketName:
    #  endpointUrl:
    #  signature_version:
    #  region_name:
    #  default_acl:
    filesystem:
      ## Not recommended for production. Use only for development or when sharing PVC
      ## between vroom and ingest-profiles pods.
      path: /var/vroom/sentry-profiles

      ## Enable persistence using Persistent Volume Claims
      ## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
      ##
      persistence:
        enabled: true
        ## Whether to share the PVC with the vroom deployment.
        ## IMPORTANT: When enabled, you MUST set vroom.persistence.accessModes to include "ReadWriteMany"
        ## to allow both vroom and ingest-profiles pods to mount the same volume.
        ## This is NOT recommended for production use. Use S3-compatible backend instead.
        shareWithVroom: false

        ## If defined, storageClassName: <storageClass>
        ## If set to "-", storageClassName: "", which disables dynamic provisioning
        ## If undefined (the default) or set to null, no storageClassName spec is
        ##   set, choosing the default provisioner.
        ##
        # storageClassName: "-"

        ## Access mode - set to ReadWriteMany when shareWithVroom is true
        accessModes:
          - ReadWriteOnce

        size: 10Gi

        ## If existingClaim is specified, no PVC will be created and this claim will
        ## be used (shareWithVroom setting will be ignored)
        existingClaim: ""

        ## If 'lookupVolumeName' is set to true, Helm will attempt to retrieve
        ## the current value of 'spec.volumeName' and incorporate it into the template.
        lookupVolumeName: true

replay:
  storage:
    # Leave empty to use the main filestore.
    # Set to one of filesystem, gcs or s3 to use a separate backend for replays.
    backend: ""
    filesystem:
      path: /var/lib/sentry/files/replays
      ## Use a separate PVC for replays (optional).
      ## When disabled, replays are stored on the container filesystem,
      ## or on the main filestore PVC if the path is under filestore.filesystem.path.
      persistence:
        enabled: false
        accessMode: ReadWriteOnce
        size: 10Gi
        existingClaim: ""
        lookupVolumeName: true
        # storageClass: "-"
    gcs: {}
      ## Point this at a pre-configured secret containing a service account. The resulting
      ## secret will be mounted at /var/run/secrets/google
      ## If filestore.backend or filestore.profiles.backend is also "gcs",
      ## secretName and credentialsFile must match.
      # secretName:
      # credentialsFile: credentials.json
    # bucketName:
    s3: {}
    #  existingSecret:
    #  accessKeyIdRef:
    #  secretAccessKeyRef:
    #  accessKey:
    #  secretKey:
    #  bucketName:
    #  endpointUrl:
    #  signature_version:
    #  region_name:
    #  default_acl:
    #  bucket_acl:
    #  addressing_style:
    #  location:

## Node Storage configuration
## Sentry uses an abstraction layer called "node storage" to store raw events.
## Previously, it used PostgreSQL as the backend, but this didn't scale for
## high-throughput environments.
## https://develop.sentry.dev/backend/application-domains/nodestore/
##
## IMPORTANT: This requires the sentry-nodestore-s3 package to be installed.
## This chart automatically installs it via init containers ONLY when nodestore.backend is configured.
nodestore:
  # Set to "s3" to enable S3-based node storage
  # When backend is empty (default), nodestore-s3 is NOT installed
  backend: ""
  # Use init container to install nodestore-s3 package on startup. If false, you need to build a custom image with nodestore-s3 pre-installed.
  installViaInitContainer: true
  # Optional environment variables for the init container that installs nodestore-s3
  initContainer:
    env: []
    # - name: HTTP_PROXY
    #   value: "http://proxy.example.com:8080"
    # - name: HTTPS_PROXY
    #   value: "http://proxy.example.com:8080"
  s3:
    # deleteThrough: "False"
    # writeThrough: "False"
    # readThrough: "False"
    # compression: "True"
    # existingSecret: "nodestore-s3-credentials"
    # accessKeyIdRef: "access-key-id"
    # secretAccessKeyRef: "secret-access-key"
    # accessKeyId: ""
    # secretAccessKey: ""
    # bucketName: "nodestore"
    # bucketPath: "nodestore"
    # endpointUrl: "http://seaweedfs:8333"
    # regionName: "us-east-1"
    # If you are using S3 provider other than AWS, and seeing SignatureDoesNotMatch errors enable this
    # setAwsChecksumCalculationVar: false

# Cronjob for filesystem cleanup when using backend filesystem
# WARNING: Use with caution as some files in the default filestore should never be deleted after the retention period
cleanerfs:
  enabled: false
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  activeDeadlineSeconds: 900
  concurrencyPolicy: Allow
  schedule: "0 1 * * *"
  days: 90
  securityContext: {}
  containerSecurityContext: {}
  annotations: {}
  podLabels: {}
  affinity: {}
  nodeSelector: {}
  tolerations: []

config:
  # No YAML Extension Config Given
  configYml: {}
  taskbrokerRoutingYml:
    taskworker.route.overrides:
      "ingest.profiling": "taskworker-ingest"
      "ingest.errors": "taskworker-ingest"
      "ingest.transactions": "taskworker-ingest"
      "ingest.attachments": "taskworker-ingest"
      "ingest.errors.postprocess": "taskworker-ingest"
      "deletions": "taskworker-long"
      "deletions.control": "taskworker-long"
      "crons": "taskworker-products"
      "uptime": "taskworker-products"
      "replays": "taskworker-products"
      "profiling": "taskworker-products"
      "releasehealth": "taskworker-products"
  sentryConfPy: |
    # No Python Extension Config Given
  snubaSettingsPy: |
    # No Python Extension Config Given
  relay: |
    # No YAML relay config given
  web:
    httpKeepalive: 15
    httpChunkedInput: true
    workers: 3
    threads: 4
    memoryReport: false
    maxRequests: 100000
    maxRequestsDelta: 500
    maxWorkerLifetime: 86400
    thunderLock: true
    logXForwardedFor: false
    bufferSize: 32768
    limitPost: 209715200
    disableLogging: true
    reloadOnRss: 600
    ignoreSignpipe: true
    ignoreWriteErrors: true
    disableWriteException: true

externalClickhouse:
  ## External ClickHouse configuration (required).
  ## Hostname or ip address of external clickhouse
  ##
  host: "clickhouse"
  tcpPort: 9000
  httpPort: 8123
  username: default
  password: ""
  database: default
  singleNode: true
  # existingSecret: secret-name
  ## set existingSecretKey if key name inside existingSecret is different from 'clickhouse-password'
  # existingSecretKey: secret-key-name
  ## Cluster name, can be found in config
