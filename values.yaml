  ##
  # clusterName: test_shard_localhost
  ## Optional: separate distributed cluster name (defaults to clusterName)
  ## Use this when your ClickHouse distributed queries need a different cluster name
  ##
  # distributedClusterName: distributed_test_shard_localhost

# Settings for Kafka.
# See https://github.com/bitnami/charts/tree/master/bitnami/kafka
kafka:
  enabled: true
  image:
    repository: bitnamilegacy/kafka
  ## Kafka broker configuration.
  ## These values are passed directly to the bitnami/kafka chart as `config`.
  ## Ref: https://github.com/bitnami/charts/tree/main/bitnami/kafka#kafka-broker-configuration
  ##
  ## Increase message.max.bytes and replica.fetch.max.bytes if you see
  ## "Broker: Message size too large" errors.
  ## replica.fetch.max.bytes should always be >= message.max.bytes.
  ##
  # config:
  #   message.max.bytes: "50000000"
  #   replica.fetch.max.bytes: "50000000"
  provisioning:
    ## Increasing the replicationFactor enhances data reliability during Kafka pod failures by replicating data across multiple brokers.
    # Note that existing topics will remain with replicationFactor: 1 when updated.
    replicationFactor: 3
    enabled: true
    # Topic list is based on files below.
    # - https://github.com/getsentry/snuba/blob/master/snuba/utils/streams/topics.py
    # - https://github.com/getsentry/sentry/blob/master/src/sentry/conf/types/kafka_definition.py
    ## Default number of partitions for topics when unspecified
    ##
    # numPartitions: 1
    # Note that snuba component might fail if you set `hooks.snubaInit.kafka.enabled` to `false` and remove the topics from this default topic list.
    topics:
      - name: events
        ## Number of partitions for this topic
        # partitions: 1
        config:
          "message.timestamp.type": LogAppendTime
      - name: event-replacements
      - name: snuba-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: cdc
      - name: transactions
        config:
          "message.timestamp.type": LogAppendTime
      - name: snuba-transactions-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: snuba-metrics
        config:
          "message.timestamp.type": LogAppendTime
      - name: outcomes
      - name: outcomes-dlq
      - name: outcomes-billing
      - name: outcomes-billing-dlq
      - name: ingest-spans
      - name: ingest-sessions
      - name: snuba-metrics-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: scheduled-subscriptions-events
      - name: scheduled-subscriptions-transactions
      - name: scheduled-subscriptions-metrics
      - name: scheduled-subscriptions-generic-metrics-sets
      - name: scheduled-subscriptions-generic-metrics-distributions
      - name: scheduled-subscriptions-generic-metrics-counters
      - name: scheduled-subscriptions-generic-metrics-gauges
      - name: events-subscription-results
      - name: transactions-subscription-results
      - name: metrics-subscription-results
      - name: generic-metrics-subscription-results
      - name: snuba-queries
        config:
          "message.timestamp.type": LogAppendTime
      - name: processed-profiles
        config:
          "message.timestamp.type": LogAppendTime
      - name: profiles-call-tree
      - name: ingest-replay-events
        config:
          "message.timestamp.type": LogAppendTime
          "max.message.bytes": "15000000"
      - name: snuba-generic-metrics
        config:
          "message.timestamp.type": LogAppendTime
      - name: snuba-generic-metrics-sets-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: snuba-generic-metrics-distributions-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: snuba-generic-metrics-counters-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: snuba-generic-metrics-gauges-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: generic-events
        config:
          "message.timestamp.type": LogAppendTime
      - name: snuba-generic-events-commit-log
        config:
          "cleanup.policy": "compact,delete"
          "min.compaction.lag.ms": "3600000"
      - name: group-attributes
        config:
          "message.timestamp.type": LogAppendTime
      - name: snuba-dead-letter-metrics
      - name: snuba-dead-letter-generic-metrics
      - name: snuba-dead-letter-replays
      - name: snuba-dead-letter-generic-events
      - name: snuba-dead-letter-querylog
      - name: snuba-dead-letter-group-attributes
      - name: snuba-dead-letter-items
      - name: ingest-attachments
      - name: ingest-attachments-dlq
      - name: ingest-transactions
      - name: ingest-transactions-dlq
      - name: ingest-transactions-backlog
      - name: ingest-events-dlq
      - name: ingest-events
        ## If the number of exceptions increases, it is recommended to increase the number of partitions for ingest-events
        # partitions: 1
      - name: ingest-replay-recordings
      - name: ingest-metrics
      - name: ingest-metrics-dlq
      - name: ingest-performance-metrics
      - name: ingest-feedback-events
      - name: ingest-feedback-events-dlq
      - name: ingest-monitors
      - name: monitors-clock-tasks
      - name: monitors-clock-tick
      - name: monitors-incident-occurrences
      - name: profiles
      - name: ingest-occurrences
      - name: snuba-spans
      - name: snuba-eap-spans-commit-log
      - name: scheduled-subscriptions-eap-spans
      - name: scheduled-subscriptions-eap-items
      - name: eap-spans-subscription-results
      - name: subscription-results-eap-items
      - name: snuba-items-commit-log
      - name: snuba-eap-mutations
      - name: snuba-lw-deletions-generic-events
      - name: snuba-lw-deletions-eap-items
      - name: shared-resources-usage
      - name: snuba-profile-chunks
      - name: buffered-segments
      - name: buffered-segments-dlq
      - name: uptime-configs
      - name: uptime-results
      - name: snuba-uptime-results
      - name: task-worker
      - name: snuba-ourlogs
      - name: snuba-items
      - name: taskworker
      - name: taskworker-dlq
      - name: taskworker-billing
      - name: taskworker-billing-dlq
      - name: taskworker-control
      - name: taskworker-control-dlq
      - name: taskworker-ingest
      - name: taskworker-ingest-dlq
      - name: taskworker-ingest-errors
      - name: taskworker-ingest-errors-dlq
      - name: taskworker-ingest-transactions
      - name: taskworker-ingest-transactions-dlq
      - name: taskworker-internal
      - name: taskworker-internal-dlq
      - name: taskworker-limited
      - name: taskworker-limited-dlq
      - name: taskworker-long
      - name: taskworker-long-dlq
      - name: taskworker-products
      - name: taskworker-products-dlq
      - name: taskworker-sentryapp
      - name: taskworker-sentryapp-dlq
      - name: taskworker-symbolication
      - name: taskworker-symbolication-dlq
      - name: taskworker-usage
      - name: taskworker-usage-dlq
  listeners:
    client:
      protocol: "PLAINTEXT"
    controller:
      protocol: "PLAINTEXT"
    interbroker:
      protocol: "PLAINTEXT"
    external:
      protocol: "PLAINTEXT"
  kraft:
    enabled: true
  metrics:
    jmx:
      image:
        repository: bitnamilegacy/jmx-exporter
  controller:
    replicaCount: 3
    nodeSelector: {}
    tolerations: []
    ## if the load on the kafka controller increases, resourcesPreset must be increased
    # resourcesPreset: "small" # "small", "medium", "large", "xlarge", "2xlarge"
    # More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
    ## if the load on the kafka controller increases, persistence.size must be increased
    # persistence:
    #   size: 8Gi
  ## Use this to enable an extra service account
  # serviceAccount:
  #   create: false
  #   name: kafka

  # sasl:
  #  ## Credentials for client communications.
  #  ## @param sasl.client.users ist of usernames for client communications when SASL is enabled
  #  ## @param sasl.client.passwords list of passwords for client communications when SASL is enabled, must match the number of client.users
  #  ## First user and password will be used if enabled
  #   client:
  #     users:
  #       - sentry
  #     passwords:
  #       - password
  #   ## @param sasl.enabledMechanisms Comma-separated list of allowed SASL mechanisms when SASL listeners are configured. Allowed types: `PLAIN`, `SCRAM-SHA-256`, `SCRAM-SHA-512`, `OAUTHBEARER`
  #   enabledMechanisms: PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
  # listeners:
  #   ## @param listeners.client.protocol Security protocol for the Kafka client listener. Allowed values are 'PLAINTEXT', 'SASL_PLAINTEXT', 'SASL_SSL' and 'SSL'
  #   client:
  #     protocol: SASL_PLAINTEXT

## This value is only used when kafka.enabled is set to false
##
externalKafka:
  ## Multi hosts and ports of external kafka
  ##
  # cluster:
  #   - host: "233.5.100.28"
  #     port: 9092
  #   - host: "kafka-confluent-2"
  #     port: 9093
  #   - host: "kafka-confluent-3"
  #     port: 9094
  ## Or Hostname (ip address) of external kafka
  # host: "kafka-confluent"
  ## and port of external kafka
  # port: 9092
  compression:
    type:  # 'gzip', 'snappy', 'lz4', 'zstd'
  message:
    max:
      bytes: 50000000
  sasl:
    mechanism: None  # PLAIN,SCRAM-256,SCRAM-512
    username: None
    password: None
    # (Optional) Use existing secret for SASL credentials instead of inline values
    # existingSecret: "my-kafka-secret"
    # existingSecretKeys:
    #   mechanism: "mechanism"
    #   username: "username"
    #   password: "password"
  security:
    protocol: plaintext  # 'PLAINTEXT', 'SASL_PLAINTEXT', 'SASL_SSL' and 'SSL'
  socket:
    timeout:
      ms: 1000
  ## Kafka topic provisioning for external Kafka
  ## When enabled, creates a Job that provisions Kafka topics
  provisioning:
    enabled: false
    ## topicctl: uses segmentio/topicctl for declarative topic management
    topicctl:
      image:
        repository: segment/topicctl
        tag: "v2.0.2"
      clusterName: "sentry-kafka"
      environment: "default"
      region: "default"
      placementStrategy: "any"
      # TLS settings for topicctl cluster config (optional).
      # Before using, create a ConfigMap with the CA bundle:
      #   kubectl create configmap kafka-ca-bundle --from-file=ca-certificates.crt=./path/to/ca.crt
      # tls:
      #   caCertPath: /etc/ssl/custom-certs/ca-certificates.crt
      #   # certPath: ""
      #   # keyPath: ""
      #   # skipVerify: false
    # volumes:
    #   - name: kafka-ca
    #     configMap:
    #       name: kafka-ca-bundle
    # volumeMounts:
    #   - name: kafka-ca
    #     mountPath: /etc/ssl/custom-certs
    #     readOnly: true
    # topics: []  # If empty, uses kafka.provisioning.topics
    # topicOverrides allows overriding partitions/config for specific topics without re-declaring all topics.
    # Keys must match topic names from kafka.provisioning.topics (or externalKafka.provisioning.topics if set).
    # Any field omitted here falls back to the topic's own value, then to provisioning defaults (numPartitions, placementStrategy).
    # topicOverrides:
    #   ingest-events:
    #     partitions: 12
    #   events:
    #     partitions: 6
    #   snuba-commit-log:
    #     partitions: 3
    #     config:
    #       "cleanup.policy": "compact,delete"
    #       "min.compaction.lag.ms": "3600000"
    #       "min.insync.replicas": "2"
    replicationFactor: 3
    # min.insync.replicas setting for provisioned topics.
    # When set, adds "min.insync.replicas" to every topic's settings.
    # Can be overridden per-topic via topicOverrides[].config["min.insync.replicas"].
    # minInsyncReplicas: 1
    numPartitions: 1
    resources: {}
    nodeSelector: {}
    tolerations: []

redis:
  enabled: true
  image:
    repository: bitnamilegacy/redis
  metrics:
    image:
      repository: bitnamilegacy/redis-exporter
  replica:
    replicaCount: 1
    nodeSelector: {}
    tolerations: []
  auth:
    enabled: false
    sentinel: false
    ## Just omit the password field if your redis cluster doesn't use password
    # password: redis
    # existingSecret: secret-name
    ## set existingSecretPasswordKey if key name inside existingSecret is different from redis-password'
    # existingSecretPasswordKey: secret-key-name
  nameOverride: sentry-redis
  master:
    persistence:
      enabled: true
    nodeSelector: {}
    tolerations: []
  ## Use this to enable an extra service account
  # serviceAccount:
  #   create: false
  #   name: sentry-redis

## This value is only used when redis.enabled is set to false
##
externalRedis:
  ## Hostname or ip address of external redis cluster
  ##
  # host: "redis"
  port: 6379
  ## Just omit the password field if your redis cluster doesn't use password
  # password: redis
  # existingSecret: secret-name
  ## set existingSecretKey if key name inside existingSecret is different from redis-password'
  # existingSecretKey: secret-key-name
  ## Integer database number to use for redis (This is an integer)
  # db: 0
  ## Use ssl for the connection to Redis (True/False)
  # ssl: false

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
  nameOverride: sentry-postgresql
  auth:
    database: sentry
  replication:
    enabled: false
    readReplicas: 2
    synchronousCommit: "on"
    numSynchronousReplicas: 1
    applicationName: sentry
  ## Use this to enable an extra service account
  # serviceAccount:
  #   enabled: false
  ## Default connection max age is 0 (unlimited connections)
  ## Set to a higher number to close connections after a period of time in seconds
  connMaxAge: 0
  ## If you are increasing the number of replicas, you need to increase max_connections
  # primary:
  #   extendedConfiguration: |
  #     max_connections=100
  #    nodeSelector: {}
  #    tolerations: []
  ## When increasing the number of exceptions, you need to increase persistence.size
  # primary:
  #   persistence:
  #     size: 8Gi

## This value is only used when postgresql.enabled is set to false
## Set either externalPostgresql.password or externalPostgresql.existingSecret to configure password
externalPostgresql:
  # host: postgres
  port: 5432
  username: postgres
  # password: postgres
  # existingSecret: secret-name
  # set existingSecretKeys in a secret, if not specified, value from the secret won't be used
  # if externalPostgresql.existingSecret is used, externalPostgresql.existingSecretKeys.password must be specified.
  existingSecretKeys: {}
  #   password: postgresql-password # Required if existingSecret is used. Key in existingSecret.
  #   username: username
  #   database: database
  #   port: port
  #   host: host
  database: sentry
  # sslMode: require
  ## Default connection max age is 0 (unlimited connections)
  ## Set to a higher number to close connections after a period of time in seconds
  connMaxAge: 0

memcached:
  config:
    memoryLimit: 2048
    verbosity: 1
    extraArgs:
      # memcached max item size
      - "-I"
      - "26214400"
  nodeSelector: {}
  tolerations: []

## Prometheus Exporter / Metrics
##
metrics:
  enabled: false

  podAnnotations: {}

  ## Configure extra options for liveness and readiness probes
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes)
  ## Readiness uses a shorter period and failure threshold so endpoints are removed quickly when /metrics fails.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 3
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 3
    timeoutSeconds: 2
    failureThreshold: 2
    successThreshold: 1

  ## Metrics exporter resource requests and limits
  ## ref: http://kubernetes.io/docs/user-guide/compute-resources/
  resources: {}
  #   limits:
  #     cpu: 100m
  #     memory: 100Mi
  #   requests:
  #     cpu: 100m
  #     memory: 100Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  securityContext: {}
  containerSecurityContext: {}

  volumes: []
  sidecars: []

  # schedulerName:
  # Optional extra labels for pod, i.e. redis-client: "true"
  podLabels: {}
  service:
    type: ClusterIP
    annotations: {}
    labels: {}

  image:
    repository: prom/statsd-exporter
    tag: v0.17.0
    pullPolicy: IfNotPresent
    imagePullSecrets: []

  # Enable this if you're using https://github.com/coreos/prometheus-operator
  serviceMonitor:
    enabled: false
    additionalLabels: {}
    namespace: ""
    namespaceSelector: {}
    # Default: scrape .Release.Namespace only
    # To scrape all, use the following:
    # namespaceSelector:
    #   any: true
    scrapeInterval: 30s
    # honorLabels: true
    relabelings: []
    metricRelabelings: []

revisionHistoryLimit: 10

# Custom DNS settings to apply to all pods. note that enabling a custom dnsConfig disables the deployment-taskworker
# default search paths. (See ./templates/sentry/taskworker/deployment-taskworker.yaml #84-94)
# dnsPolicy: "ClusterFirst"
# dnsConfig:
#   nameservers: []
#   searches: []
#   options: []

extraManifests: []

pgbouncer:
  enabled: false
  env: []
  postgres:
    cp_max: 10
    cp_min: 5
    host: ''
    dbname: ''
    user: ''
    password: ''
  image:
    repository: "bitnamilegacy/pgbouncer"
    tag: "1.23.1-debian-12-r5"
    pullPolicy: IfNotPresent
  replicas: 2
  podDisruptionBudget:
    enabled: true
    # Define either 'minAvailable' or 'maxUnavailable', never both.
    minAvailable: 1
    # -- Maximum unavailable pods set in PodDisruptionBudget. If set, 'minAvailable' is ignored.
    # maxUnavailable: 1
  authType: "md5"
  maxClientConn: "8192"
  poolSize: "50"
  poolMode: "transaction"
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 25%
  priorityClassName: ''
  topologySpreadConstraints: []
  service:
    # Session Affinity for Kubernetes service, can be "None" or "ClientIP"
    # If "ClientIP", consecutive client requests will be directed to the same Pod
    sessionAffinity: None
    # sessionAffinityConfig Additional settings for the sessionAffinity
    # sessionAffinityConfig:
    #   clientIP:
    #     timeoutSeconds: 180
    sessionAffinityConfig: {}

# Helm hooks are similar to Argo CD hooks, but some of them are incompatible.
# Please refer to for details:
# https://argo-cd.readthedocs.io/en/stable/user-guide/helm/#helm-hooks
useArgoCdCompatibleAnnotations: false
