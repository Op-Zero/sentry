# WARNING: If you update this and you are also using the Kafka subchart, you need to update the provisioned Topic names in this values as well!
# kafkaTopicOverrides:
#  prefix: ""

# enable and reference the volume
geodata:
  accountID: ""
  licenseKey: ""
  editionIDs: ""
  annotations: {}
  persistence:
    ## If defined, storageClassName: <storageClass>
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    # storageClass: "" # for example: csi-s3
    size: 1Gi
    accessModes: ["ReadWriteMany"]
    ## If 'lookupVolumeName' is set to true, Helm will attempt to retrieve
    ## the current value of 'spec.volumeName' and incorporate it into the template.
    lookupVolumeName: true
  volumeName: ""  # for example: data-sentry-geoip
  # mountPath of the volume containing the database
  mountPath: ""  # for example: /usr/share/GeoIP
  # path to the geoip database inside the volumemount
  path: ""  # for example: /usr/share/GeoIP/GeoLite2-City.mmdb

sentry:
  # to not generate a sentry-secret, use these 2 values to reference an existing secret
  # existingSecret: "my-secret"
  # existingSecretKey: "my-secret-key"
  singleOrganization: true
  web:
    enabled: true
    annotations: {}
    # if using filestore backend filesystem with RWO access, set strategyType to Recreate
    strategyType: RollingUpdate
    replicas: 1
    env: []
    existingSecretEnv: ""
    # HTTP probes: liveness tolerates brief blips; readiness is stricter so Service endpoints drop faster.
    livenessProbe:
      failureThreshold: 5
      initialDelaySeconds: 10
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 2
    readinessProbe:
      failureThreshold: 2
      initialDelaySeconds: 10
      periodSeconds: 3
      successThreshold: 1
      timeoutSeconds: 2
    resources: {}
    #  requests:
    #    cpu: 200m
    #    memory: 850Mi
    affinity: {}
    nodeSelector: {}
    securityContext: {}
    # if you are using GKE Ingress controller use 'securityPolicy' to add Google Cloud Armor Ingress policy
    securityPolicy: ""
    # if you are using GKE Ingress controller use 'customResponseHeaders' to add custom response header
    customResponseHeaders: []
    containerSecurityContext: {}
    service:
      annotations: {}
    tolerations: []
    podLabels: {}
    # Mount and use custom CA
    # customCA:
    #   secretName: custom-ca
    #   item: ca.crt
    # logLevel: "WARNING" # DEBUG|INFO|WARNING|ERROR|CRITICAL|FATAL
    # logFormat: "human" # human|machine
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 50
      # targetMemoryUtilizationPercentage: 50
      # Only available with autoscaling/v2
      behavior: {}
    sidecars: []
    topologySpreadConstraints: []
    volumes: []
    volumeMounts: []
    # workers: 3
    uwsgiMaxFd: 8192

  features:
    orgSubdomains: false
    enableProfiling: false
    enableSessionReplay: true
    enableFeedback: false
    enableSpan: false
    enableUptime: false

  # example customFeature to enable Metrics(beta) https://docs.sentry.io/product/metrics/
  # customFeatures:
  # - organizations:custom-metric
  # - organizations:custom-metrics-experimental
  # - organizations:derive-code-mappings
  # other feature here https://github.com/getsentry/sentry/blob/24.11.2/src/sentry/features/temporary.py

  jsSdk:
    # Enable local hosting of JS SDK bundles instead of loading from browser.sentry-cdn.com
    # When enabled, Sentry will download and serve JS SDK bundles locally
    setupAssets: false
    # URL template for JS SDK bundles (used when setupAssets is true)
    # %s will be replaced with SDK version and bundle variant
    defaultSdkUrl: "https://browser.sentry-cdn.com/%s/bundle%s.min.js"

  taskBroker:
    enabled: true
    annotations: {}
    replicas: 1
    env: []
    resources: {}
    affinity: {}
    nodeSelector: {}
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: []
    sidecars: []
    volumes: []
    volumeMounts: []
    priorityClassName: ""
    tolerations: []
    persistence:
      enabled: true
      size: 1Gi
      storageClass: ""
      accessMode: ReadWriteOnce
      # persistentVolumeClaimRetentionPolicy controls PVC lifecycle on StatefulSet deletion/scale-down.
      # Requires Kubernetes 1.27+ with StatefulSetAutoDeletePVC feature gate enabled.
      # persistentVolumeClaimRetentionPolicy:
      #   whenDeleted: Retain  # or Delete
      #   whenScaled: Retain   # or Delete
    # brokers[].resources -- Optional per-broker container resources; merged over taskBroker.resources (broker keys win).
    # brokers[].topologySpreadConstraints -- Optional per-broker pod topologySpreadConstraints; overriding taskBroker.topologySpreadConstraints (broker list win).
    brokers:
      - name: default
        topic: taskworker
        consumerGroup: taskworker
        replicas: 1
      - name: ingest
        topic: taskworker-ingest
        consumerGroup: taskworker-ingest
        replicas: 1
      - name: long
        topic: taskworker-long
        consumerGroup: taskworker-long
        replicas: 1
      - name: products
        topic: taskworker-products
        consumerGroup: taskworker-products
        replicas: 1

  taskScheduler:
    enabled: true
    annotations: {}
    replicas: 1
    env: []
    resources: {}
    affinity: {}
    nodeSelector: {}
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: []
    sidecars: []
    volumes: []
    volumeMounts: []
    priorityClassName: ""
    tolerations: []

  taskWorker:
    enabled: true
    annotations: {}
    replicas: 1
    concurrency: 4
    # maxChildTaskCount -- Number of tasks child processes execute before restarting.
    # Helps prevent memory growth over time. See: https://github.com/getsentry/self-hosted/pull/4279
    maxChildTaskCount: 10000
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 50
      # targetMemoryUtilizationPercentage: 50
      # Only available with autoscaling/v2
      behavior: {}
    env: []
    resources: {}
    affinity: {}
    nodeSelector: {}
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: []
    sidecars: []
    volumes: []
    volumeMounts: []
    priorityClassName: ""
    tolerations: []
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
    # workers[].resources -- Optional per-worker container resources; merged over taskWorker.resources (worker keys win).
    # workers[].topologySpreadConstraints -- Optional per-worker pod topologySpreadConstraints; overriding taskWorker.topologySpreadConstraints (worker list win).
    workers:
      - name: default
        brokerName: default
        brokerReplicas: 1
        concurrency: 4
        replicas: 1
      - name: ingest
        brokerName: ingest
        brokerReplicas: 1
        concurrency: 4
        replicas: 1
      - name: long
