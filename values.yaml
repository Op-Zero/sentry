    enabled: true
    annotations: {}
    replicas: 1
    # set command to ["snuba","api"] if securityContext.runAsUser > 0
    # see: https://github.com/getsentry/snuba/issues/956
    command: []
    #   - snuba
    #   - api
    env: []
    # HTTP probes: liveness tolerates brief blips; readiness is stricter so Service endpoints drop faster.
    livenessProbe:
