# Set this to true to support IPV6 networks
ipv6: false

global:

  # Set SAMPLED_DEFAULT_RATE parameter for all projects
  # sampledDefaultRate: 1.0

  # Kubernetes cluster domain
  clusterDomain: "cluster.local"

  nodeSelector: {}
  tolerations: []
  sidecars: []
  volumeMounts: []
  volumes: []

# Profiles correspond to COMPOSE_PROFILES in the original self-hosted docker-compose.yml.
# https://github.com/getsentry/self-hosted/blob/master/docker-compose.yml
# When set to errors-only, the chart only deploys components related to processing errors.
# For more, read https://develop.sentry.dev/self-hosted/experimental/errors-only/.
profiles:
  - feature-complete

user:
  create: true
  email: admin@sentry.local
  ## You MUST set either `password` or `existingSecret` when `create: true`.
  ## Setting `existingSecret` is strongly recommended for production.
  password: ""

  ## set this value to an existingSecret name to create the admin user with the password in the secret
  # existingSecret: sentry-admin-password

  ## set this value to an existingSecretKey which holds the password to be used for sentry admin user default key is `admin-password`
  # existingSecretKey: admin-password

# this is required on the first installation, as sentry has to be initialized first
# recommended to set false for updating the helm chart afterwards,
# as you will have some downtime on each update if it's a hook
# deploys relay & snuba consumers as post hooks
asHook: true

images:
  sentry:
    # repository: getsentry/sentry
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []
  snuba:
    # repository: getsentry/snuba
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []
  relay:
    # repository: getsentry/relay
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []
  symbolicator:
    # repository: getsentry/symbolicator
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []
  vroom:
    # repository: getsentry/vroom
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []
  uptimeChecker:
    # repository: getsentry/uptime-checker
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []
  taskbroker:
    # repository: getsentry/taskbroker
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []
  launchpad:
    # repository: getsentry/launchpad
    # tag: Chart.AppVersion
    # pullPolicy: IfNotPresent
    imagePullSecrets: []

serviceAccount:
  # serviceAccount.annotations -- Additional Service Account annotations.
  annotations: {}
  # serviceAccount.enabled -- If `true`, a custom Service Account will be used.
  enabled: false
  # serviceAccount.name -- The base name of the ServiceAccount to use. Will be appended with e.g. `snuba-api` or `web` for the pods accordingly.
  name: "sentry"
  # serviceAccount.automountServiceAccountToken -- Automount API credentials for a Service Account.
  automountServiceAccountToken: true

vroom:
  annotations: {}
  args: []
  replicas: 1
  env: []
  # HTTP probes: liveness tolerates brief blips; readiness is stricter so Service endpoints drop faster.
  livenessProbe:
    failureThreshold: 5
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 2
  readinessProbe:
    failureThreshold: 2
    initialDelaySeconds: 10
    periodSeconds: 3
    successThreshold: 1
    timeoutSeconds: 2
  resources: {}
  #  requests:
  #    cpu: 100m
  #    memory: 700Mi
  affinity: {}
  nodeSelector: {}
  securityContext: {}
  containerSecurityContext: {}
  # priorityClassName: ""
  topologySpreadConstraints: []
  service:
    annotations: {}
  tolerations: []
  podLabels: {}
  persistence:
    enabled: true  # Set true for using PersistentVolumeClaim, false for emptyDir
    ## If 'lookupVolumeName' is set to true, Helm will attempt to retrieve
    ## the current value of 'spec.volumeName' and incorporate it into the template.
    lookupVolumeName: true
    ## Access modes for the PVC
    ## IMPORTANT: If filestore.profiles.filesystem.persistence.shareWithVroom is true,
    ## you MUST include "ReadWriteMany" to allow both vroom and ingest-profiles pods
    ## to mount the same volume. Example:
    ## accessModes:
    ##   - ReadWriteMany
    accessModes:
      - ReadWriteOnce
    # storageClassName: standard
    size: "10Gi"
    ## If existingClaim is specified, no PVC will be created and this claim will
    ## be used
    existingClaim: ""
    # this will be passed to the SENTRY_BUCKET_PROFILES env var
    # examples: file:///var/vroom/sentry-profiles, s3://my-profiles-bucket, gs://my-profiles-bucket
    bucketString: "file:///var/vroom/sentry-profiles"

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 50
    # targetMemoryUtilizationPercentage: 50
    # Only available with autoscaling/v2
    behavior: {}
  sidecars: []
  volumes: []
  volumeMounts: []

launchpadTaskWorker:
  enabled: true
  annotations: {}
  replicas: 1
  concurrency: 4
  env: []
  resources: {}
  affinity: {}
